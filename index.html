<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa de Oferta Solar</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="overlay"></div>

<header>

    <div class="logo-area">

        <h1>🏆 COPA DE OFERTA SOLAR</h1>

        <p>
            A corrida rumo ao São João começou!
        </p>

    </div>

</header>

<section class="painel-superior">

    <div class="info-card">
        <h3>⏳ Dias Restantes</h3>
        <span id="contador">--</span>
    </div>

    <div class="info-card">
        <h3>💰 Meta Total</h3>
        <span id="metaTotal">R$ 0</span>
    </div>

    <div class="info-card">
        <h3>⚡ Vendido Total</h3>
        <span id="vendidoTotal">R$ 0</span>
    </div>

</section>

<section class="podio">

    <h2>🏆 PÓDIO ATUAL</h2>

    <div class="podio-container">

        <div class="podio-item segundo">
            <div class="medalha">🥈</div>
            <div id="segundoNome">-</div>
        </div>

        <div class="podio-item primeiro">
            <div class="medalha">🥇</div>
            <div id="primeiroNome">-</div>
        </div>

        <div class="podio-item terceiro">
            <div class="medalha">🥉</div>
            <div id="terceiroNome">-</div>
        </div>

    </div>

</section>

<section class="ranking">

    <h2>🏁 CORRIDA DOS VENDEDORES</h2>

    <div id="pistas"></div>

</section>

<footer>

    <p>
        🚀 Quem bater a meta até 15 de Junho receberá sua comissão antecipada para curtir o São João.
    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
